name: Auto Generate SEO Pages

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repo
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Run Generator
    run: node scripts/generate.js

  - name: Commit Generated Files
    run: |
      git config --global user.name "github-actions"
      git config --global user.email "actions@github.com"
      git add .
      git diff --quiet && git diff --staged --quiet || git commit -m "Auto generate SEO pages"
      git push
